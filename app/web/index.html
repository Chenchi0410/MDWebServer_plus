<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MDWebServer Refactored</title>
  <style>
    body { margin: 0; font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif; background: #f6f7f9; color: #1f2933; }
    header { padding: 18px 28px; background: #fff; border-bottom: 1px solid #d9e1ea; }
    main { max-width: 1260px; margin: 0 auto; padding: 22px; display: grid; grid-template-columns: 360px 1fr; gap: 18px; }
    section { background: #fff; border: 1px solid #d9e1ea; border-radius: 8px; padding: 16px; }
    h1 { margin: 0; font-size: 22px; }
    h2 { margin: 0 0 12px; font-size: 16px; }
    label { display: block; margin-top: 12px; margin-bottom: 6px; color: #64748b; font-size: 13px; }
    input, select, textarea, button { width: 100%; box-sizing: border-box; border: 1px solid #d9e1ea; border-radius: 6px; padding: 9px 10px; font: inherit; }
    button { margin-top: 14px; background: #0f766e; color: white; cursor: pointer; border: 0; }
    button:disabled { opacity: .65; cursor: not-allowed; }
    .tabs { display: flex; gap: 8px; margin-bottom: 14px; }
    .tabs button { width: auto; margin: 0; background: #e2e8f0; color: #1f2933; }
    .tabs button.active { background: #0f766e; color: white; }
    .tab { display: none; }
    .tab.active { display: block; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin: 14px 0; }
    .metric { border: 1px solid #d9e1ea; border-radius: 8px; padding: 12px; background: #fbfcfd; }
    .value { font-size: 24px; font-weight: 700; }
    .name { color: #64748b; font-size: 12px; }
    pre { white-space: pre-wrap; word-break: break-word; background: #0f172a; color: #e2e8f0; border-radius: 8px; padding: 14px; max-height: 560px; overflow: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; border-bottom: 1px solid #d9e1ea; padding: 8px 6px; }
    .hint { color: #64748b; font-size: 13px; line-height: 1.55; }
    @media (max-width: 980px) { main { grid-template-columns: 1fr; } .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>MDWebServer Refactored MVP</h1>
    <div class="hint">转换器服务 · 转换器评测 · Markdown 质量评测</div>
  </header>
  <main>
    <aside>
      <section>
        <div class="tabs">
          <button class="active" data-tab="convert">转换</button>
          <button data-tab="quality">MD质量</button>
          <button data-tab="summary">摘要</button>
        </div>
        <div id="tab-convert" class="tab active">
          <h2>Markdown 转换</h2>
          <label>文件</label>
          <input id="file" type="file" />
          <label>转换器</label>
          <select id="converter"></select>
          <label>黄金集 PDF 文件名（可选）</label>
          <input id="pdfName" type="text" placeholder="1 timetable (1)_page27.pdf" />
          <button id="convertBtn">转换并评测</button>
        </div>
        <div id="tab-quality" class="tab">
          <h2>Markdown 文件质量评测</h2>
          <label>Markdown 内容</label>
          <textarea id="mdText" rows="10" placeholder="# Title&#10;&#10;content"></textarea>
          <button id="qualityBtn">评测 Markdown</button>
        </div>
        <div id="tab-summary" class="tab">
          <h2>Benchmark 摘要</h2>
          <div id="benchmark" class="hint">加载中...</div>
        </div>
        <div id="status" class="hint" style="margin-top: 12px;"></div>
      </section>
    </aside>
    <section>
      <h2>结果</h2>
      <div id="metrics" class="grid"></div>
      <div id="details" class="hint">请选择左侧功能。</div>
      <pre id="markdown" style="display:none;"></pre>
    </section>
  </main>
  <script>
    const $ = (id) => document.getElementById(id);
    document.querySelectorAll(".tabs button").forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        btn.classList.add("active");
        $(`tab-${btn.dataset.tab}`).classList.add("active");
      };
    });
    function status(text) { $("status").textContent = text; }
    function card(name, value) { return `<div class="metric"><div class="value">${value}</div><div class="name">${name}</div></div>`; }
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || "").split(",")[1] || "");
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
    async function loadConverters() {
      const data = await (await fetch("/api/converters")).json();
      $("converter").innerHTML = data.converters.map(c => `<option value="${c.id}">${c.name} (${c.available ? "ready" : "missing"})</option>`).join("");
    }
    async function loadBenchmark() {
      const data = await (await fetch("/api/benchmark-summary")).json();
      $("benchmark").innerHTML = `<table><tr><th>转换器</th><th>类别</th><th>平均分</th></tr>${data.rows.map(r => `<tr><td>${r.converter}</td><td>${r.category}</td><td>${r.avg_score}</td></tr>`).join("")}</table>`;
    }
    $("convertBtn").onclick = async () => {
      const file = $("file").files[0];
      if (!file) return status("请先选择文件。");
      $("convertBtn").disabled = true;
      try {
        status("转换与评测中...");
        const payload = {
          filename: file.name,
          content_base64: await fileToBase64(file),
          converter_id: $("converter").value,
          pdf_name: $("pdfName").value || file.name
        };
        const data = await (await fetch("/api/conversions", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(payload) })).json();
        if (data.error) throw new Error(data.error);
        $("metrics").innerHTML = [
          card("Markdown质量", Math.round(data.markdown_quality.overall_score)),
          card("正式评测", data.converter_benchmark.overall_score === undefined ? data.converter_benchmark.status : Math.round(data.converter_benchmark.overall_score)),
          card("输出大小", data.conversion.output_bytes)
        ].join("");
        $("details").innerHTML = `<p>Run ID: ${data.run_id}</p><p>转换器: ${data.conversion.converter_id}</p>`;
        $("markdown").style.display = "block";
        $("markdown").textContent = data.markdown || "";
        status("完成。");
      } catch (err) {
        status(`失败：${err.message}`);
      } finally {
        $("convertBtn").disabled = false;
      }
    };
    $("qualityBtn").onclick = async () => {
      const data = await (await fetch("/api/md-quality-evaluations", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({ filename: "inline.md", markdown: $("mdText").value }) })).json();
      $("metrics").innerHTML = [card("Markdown质量", Math.round(data.markdown_quality.overall_score)), card("问题数", data.markdown_quality.issue_count), card("Run", data.run_id.slice(0, 8))].join("");
      $("details").innerHTML = `<table><tr><th>维度</th><th>分数</th><th>问题数</th></tr>${data.markdown_quality.dimensions.map(d => `<tr><td>${d.dimension}</td><td>${d.score}</td><td>${d.issues.length}</td></tr>`).join("")}</table>`;
      $("markdown").style.display = "none";
    };
    loadConverters();
    loadBenchmark();
  </script>
</body>
</html>
