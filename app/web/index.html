<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MDWebServer Converter Service</title>
  <style>
    :root { color-scheme: light; }
    body { margin: 0; font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif; background: #f5f7fa; color: #202a36; }
    header { padding: 18px 28px; background: #fff; border-bottom: 1px solid #d8e0ea; }
    h1 { margin: 0; font-size: 22px; font-weight: 650; }
    main { max-width: 1240px; margin: 0 auto; padding: 22px; display: grid; grid-template-columns: 360px 1fr; gap: 18px; }
    section { background: #fff; border: 1px solid #d8e0ea; border-radius: 8px; padding: 16px; }
    h2 { margin: 0 0 12px; font-size: 16px; }
    label { display: block; margin-top: 12px; margin-bottom: 6px; color: #5f6f82; font-size: 13px; }
    input, select, button { width: 100%; box-sizing: border-box; border: 1px solid #ccd6e2; border-radius: 6px; padding: 9px 10px; font: inherit; }
    button { margin-top: 14px; border: 0; background: #0f766e; color: #fff; cursor: pointer; font-weight: 600; }
    button:disabled { opacity: .65; cursor: wait; }
    pre { white-space: pre-wrap; word-break: break-word; background: #111827; color: #e5e7eb; border-radius: 8px; padding: 14px; max-height: 560px; overflow: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; border-bottom: 1px solid #d8e0ea; padding: 8px 6px; vertical-align: top; }
    .hint { color: #5f6f82; font-size: 13px; line-height: 1.55; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin: 14px 0; }
    .metric { border: 1px solid #d8e0ea; border-radius: 8px; padding: 12px; background: #fbfcfe; }
    .value { font-size: 21px; font-weight: 700; }
    .name { color: #5f6f82; font-size: 12px; margin-top: 3px; }
    .error { color: #b42318; }
    @media (max-width: 980px) { main { grid-template-columns: 1fr; } .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>MDWebServer 多 Markdown 转换器服务</h1>
    <div class="hint">当前阶段只负责：上传文件、选择转换器、输出 Markdown 和转换产物记录。</div>
  </header>
  <main>
    <aside>
      <section>
        <h2>执行转换</h2>
        <label>文件</label>
        <input id="file" type="file" />
        <label>转换器</label>
        <select id="converter"></select>
        <button id="convertBtn">转换为 Markdown</button>
        <div id="status" class="hint" style="margin-top: 12px;"></div>
      </section>
      <section style="margin-top: 18px;">
        <h2>可用转换器</h2>
        <div id="converters" class="hint">加载中...</div>
      </section>
    </aside>
    <section>
      <h2>转换结果</h2>
      <div id="metrics" class="grid"></div>
      <div id="details" class="hint">请选择文件并执行转换。</div>
      <pre id="markdown" style="display:none;"></pre>
    </section>
  </main>
  <script>
    const $ = (id) => document.getElementById(id);
    const state = { converters: [] };

    function setStatus(text, isError = false) {
      $("status").textContent = text;
      $("status").className = isError ? "hint error" : "hint";
    }

    function card(name, value) {
      return `<div class="metric"><div class="value">${value}</div><div class="name">${name}</div></div>`;
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || "").split(",")[1] || "");
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function renderConverters() {
      $("converter").innerHTML = state.converters
        .map(c => `<option value="${c.id}" ${c.available ? "" : "disabled"}>${c.name} ${c.version ? "v" + c.version : ""} (${c.available ? "ready" : "missing"})</option>`)
        .join("");
      $("converters").innerHTML = `<table><tr><th>转换器</th><th>版本</th><th>格式</th><th>状态</th></tr>${state.converters.map(c => `<tr><td>${c.name}</td><td>${c.version || "unknown"}</td><td>${c.supported_extensions.join(", ")}</td><td>${c.message}</td></tr>`).join("")}</table>`;
    }

    async function loadConverters(extension = "") {
      const url = extension ? `/api/converters?extension=${encodeURIComponent(extension)}` : "/api/converters";
      const data = await (await fetch(url)).json();
      state.converters = data.converters || [];
      renderConverters();
    }

    $("file").onchange = () => {
      const file = $("file").files[0];
      if (!file || !file.name.includes(".")) {
        loadConverters();
        return;
      }
      loadConverters(file.name.split(".").pop());
    };

    $("convertBtn").onclick = async () => {
      const file = $("file").files[0];
      if (!file) {
        setStatus("请先选择文件。", true);
        return;
      }
      if (!$("converter").value) {
        setStatus("当前文件类型没有可用转换器。", true);
        return;
      }
      $("convertBtn").disabled = true;
      try {
        setStatus("转换中...");
        const payload = {
          filename: file.name,
          content_base64: await fileToBase64(file),
          converter_id: $("converter").value,
          options: {}
        };
        const response = await fetch("/api/conversions", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        if (data.error) throw new Error(data.error);
        $("metrics").innerHTML = [
          card("状态", data.status),
          card("输出字节", data.output.bytes),
          card("耗时", `${data.runtime.duration_seconds}s`)
        ].join("");
        $("details").innerHTML = `<p>Run ID: ${data.run_id}</p><p>转换器: ${data.converter.name} ${data.converter.version || ""}</p><p>结果文件: ${data.conversion_result_path}</p><p>Markdown: ${data.output.markdown_path}</p>`;
        $("markdown").style.display = "block";
        $("markdown").textContent = data.markdown || "";
        setStatus(data.status === "success" ? "转换完成。" : `转换失败：${data.error || "unknown error"}`, data.status !== "success");
      } catch (err) {
        setStatus(`失败：${err.message}`, true);
      } finally {
        $("convertBtn").disabled = false;
      }
    };

    loadConverters();
  </script>
</body>
</html>
